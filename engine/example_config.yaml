# Multi-model inference engine configuration

models:
  - model_id: Qwen/Qwen2.5-7B-Instruct
    name: qwen-7b
    tp_size: 1
    dtype: bfloat16
    max_batch_size: 32
    max_seq_len: 4096

  - model_id: Qwen/Qwen2.5-14B-Instruct
    name: qwen-14b
    tp_size: 1
    dtype: bfloat16
    max_batch_size: 16
    max_seq_len: 4096

gpu_ids: [0]
t0_budget_gb: 40.0        # HBM budget for model weights per GPU
t1_budget_gb: 400.0       # Pinned RAM budget (total)
kv_cache_budget_gb: 35.0  # HBM budget for KV cache per GPU
kv_page_size: 16          # Tokens per KV cache page

scheduler:
  policy: round_robin
  prefetch_queue_threshold: 1
  max_batch_tokens: 4096
  max_consecutive_batches: 32

server:
  host: 0.0.0.0
  port: 8000
  max_queue_depth: 64
  request_timeout_s: 120.0
