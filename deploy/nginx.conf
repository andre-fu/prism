upstream prism {
    server prism:8000;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # TLS certificates (mount via docker volume)
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Streaming support (SSE)
    proxy_buffering off;
    proxy_cache off;

    # Timeouts for long generation
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Request size limit (for model uploads)
    client_max_body_size 100G;

    location / {
        proxy_pass http://prism;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming headers
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Health check (no auth needed)
    location /health {
        proxy_pass http://prism/health;
    }

    # Metrics (internal only — restrict by IP in production)
    location /metrics {
        proxy_pass http://prism/metrics;
        # allow 10.0.0.0/8;
        # deny all;
    }
}
